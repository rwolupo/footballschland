[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── www → non-www redirect ──
[[redirects]]
  from = "https://www.footballschland.de/*"
  to = "https://footballschland.de/:splat"
  status = 301
  force = true

# ── Alte Seiten aus vorheriger Website ──
[[redirects]]
  from = "/lander"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/lander/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/blockblog"
  status = 301
  force = true

[[redirects]]
  from = "/blog/"
  to = "/blockblog/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/blockblog/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blockblog/categories/*"
  to = "/blockblog"
  status = 301
